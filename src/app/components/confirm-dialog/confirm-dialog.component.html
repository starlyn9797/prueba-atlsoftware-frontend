@if (visible()) {
  <div class="overlay" (click)="cancel.emit()">
    <div class="dialog" (click)="$event.stopPropagation()">
      <h3>{{ title() }}</h3>
      <p>{{ message() }}</p>
      <div class="actions">
        <button class="btn-cancel" (click)="cancel.emit()">Cancelar</button>
        <button class="btn-confirm" (click)="confirm.emit()">Confirmar</button>
      </div>
    </div>
  </div>
}
